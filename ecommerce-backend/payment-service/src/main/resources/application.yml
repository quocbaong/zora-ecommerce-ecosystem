server:
  port: 8086

spring:
  application:
    name: payment-service

stripe:
  secret:
    key: ${STRIPE_SECRET_KEY:sk_test_dummy}
  webhook:
    secret: ${STRIPE_WEBHOOK_SECRET:whsec_dummy}

services:
  order-url: ${ORDER_SERVICE_URL:http://localhost:8085}
  frontend-url: ${FRONTEND_URL:http://localhost:5173}

payos:
  client-id: ${PAYOS_CLIENT_ID:}
  api-key: ${PAYOS_API_KEY:}
  checksum-key: ${PAYOS_CHECKSUM_KEY:}

management:
  endpoints:
    web:
      exposure:
        include: prometheus, health, info
  endpoint:
    health:
      show-details: always
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://zipkin:9411/api/v2/spans

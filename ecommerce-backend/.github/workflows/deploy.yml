name: Build & Deploy backend

# Push main: chỉ build service nào có file thay đổi → push GHCR → SSH vào EC2 deploy.
# Chạy tay (workflow_dispatch): build lại TẤT CẢ service.
#
# LƯU Ý: image GHCR mặc định là PRIVATE. Sau lần push đầu, vào GitHub → Packages →
# mỗi package → Package settings → đổi Visibility = Public (để EC2 pull không cần login).
# Nếu để Private: trên EC2 phải `docker login ghcr.io` bằng PAT có quyền read:packages.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
      has_changes: ${{ steps.set.outputs.has_changes }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        if: github.event_name != 'workflow_dispatch'
        with:
          filters: |
            gateway-service: 'gateway-service/**'
            auth-service: 'auth-service/**'
            user-service: 'user-service/**'
            product-service: 'product-service/**'
            cart-service: 'cart-service/**'
            order-service: 'order-service/**'
            payment-service: 'payment-service/**'
            notification-service: 'notification-service/**'
            ai-service: 'ai-service/**'
            chat-service: 'chat-service/**'

      - id: set
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            matrix='["gateway-service","auth-service","user-service","product-service","cart-service","order-service","payment-service","notification-service","ai-service","chat-service"]'
          else
            matrix='${{ steps.filter.outputs.changes }}'
          fi
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          if [ -z "$matrix" ] || [ "$matrix" = "[]" ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

  test:
    needs: changes
    if: needs.changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJSON(needs.changes.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        if: matrix.service != 'chat-service'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Run unit tests (${{ matrix.service }})
        if: matrix.service != 'chat-service'
        run: |
          cd ${{ matrix.service }}
          chmod +x mvnw
          ./mvnw -B test

      - name: Skip tests (chat-service chưa có test suite)
        if: matrix.service == 'chat-service'
        run: echo "chat-service has no test suite yet - skipping"

  build:
    needs: [changes, test]
    if: needs.changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJSON(needs.changes.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase owner
        id: vars
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Build & push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: |
            ghcr.io/${{ steps.vars.outputs.owner }}/${{ matrix.service }}:latest
            ghcr.io/${{ steps.vars.outputs.owner }}/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: [changes, build]
    if: needs.changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: GHCR_TOKEN,GHCR_USER
          script: |
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            cd ~/app
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            docker image prune -f
